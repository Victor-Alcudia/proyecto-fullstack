<!-- Script para manejar el estado de sesión -->
<script>
    // Función para actualizar navbar según sesión
    function actualizarNavbar() {
        const token = localStorage.getItem('token');
        const email = localStorage.getItem('userEmail');
        
        const loginNav = document.getElementById('loginNavItem');
        const registerNav = document.getElementById('registerNavItem');
        const userNav = document.getElementById('userNavItem');
        const userEmailSpan = document.getElementById('userEmail');
        
        // También actualizar las secciones del index si existen
        const userDisplay = document.getElementById('user-display');
        const loginSection = document.getElementById('login-section');
        const registroCallout = document.getElementById('registro-callout');
        
        if (token && email) {
            // Usuario logueado
            if (loginNav) loginNav.style.display = 'none';
            if (registerNav) registerNav.style.display = 'none';
            if (userNav) {
                userNav.style.display = 'block';
                if (userEmailSpan) userEmailSpan.textContent = email;
            }
            
            // Actualizar secciones del index
            if (userDisplay) userDisplay.style.display = 'block';
            if (loginSection) loginSection.style.display = 'none';
            if (registroCallout) registroCallout.style.display = 'none';
            
            // Actualizar email en user-display si existe
            const userEmailDisplay = document.getElementById('user-email');
            if (userEmailDisplay) userEmailDisplay.textContent = email;
            
        } else {
            // Usuario no logueado
            if (loginNav) loginNav.style.display = 'block';
            if (registerNav) registerNav.style.display = 'block';
            if (userNav) userNav.style.display = 'none';
            
            // Actualizar secciones del index
            if (userDisplay) userDisplay.style.display = 'none';
            if (loginSection) loginSection.style.display = 'block';
            if (registroCallout) registroCallout.style.display = 'block';
        }
    }
    
    // Función para mostrar login (scroll al formulario)
    function mostrarLogin() {
        const loginSection = document.getElementById('login-section');
        if (loginSection) {
            loginSection.scrollIntoView({ behavior: 'smooth' });
        }
    }
    
    // Función para cerrar sesión
    function cerrarSesion() {
        if (confirm('¿Cerrar sesión?')) {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            actualizarNavbar();
            window.location.href = 'index.html';
        }
    }
    
    // Ejecutar al cargar la página
    document.addEventListener('DOMContentLoaded', actualizarNavbar);
</script>
